{% extends "layout.html" %}
{% block body %}
<div class="three-column">
    {% for game in results %}
    <div class="w3-card-4" style="background: rgba(23, 26, 33, 0.8); margin-bottom: 20px; padding-bottom: 10px;">
        <a href="{{ url_for('game', id=game[0]) }}">
            <img src="{{ game[3] }}" alt="{{ game[2] }}">
        </a>

        <div style="padding: 10px;">
            <h3 style="font-size: 1.1em; margin: 5px 0;">{{ game[2] }}</h3>
            <p style="color: #66c0f4; font-size: 0.9em;">{{ game[1] }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
